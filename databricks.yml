bundle:
  name: databricks-apps-fastapi-starter
  databricks_cli_version: ">= 0.283.0"

include:
  - resources/*.yml

sync:
  exclude:
    - tests/**
    - frontend/**
    - client/**
    - .github/**
    - .venv/**
    - .mypy_cache/**
    - .ruff_cache/**
    - .pytest_cache/**
    - notebooks/**
    - alembic/**
    - "*.egg-info/**"
    - .local/**
    - .coverage
    - coverage.xml
    - "*.md"

variables:
  app_name:
    description: Databricks app name
    default: databricks-apps-fastapi-starter
  resource_name_suffix:
    description: Environment suffix for resource names
    default: dev
  environment:
    description: Runtime environment label
    default: development
  log_level:
    description: App log level
    default: INFO
  enable_obo:
    description: Whether to enable OBO behavior
    default: "false"
  volume_full_name:
    description: UC volume full name (catalog.schema.volume)
    default: main.default.starter_volume
  cluster_node_type:
    description: Node type for job clusters
    default: i3.xlarge
  knowledge_assistant_endpoint_name:
    description: Name of the Knowledge Assistant serving endpoint (created in Agent Bricks)
    default: ""
  app_config:
    type: complex
    description: Runtime config for the Databricks app
    default:
      command:
        - python
        - run_app.py
      env:
        - name: SERVE_STATIC
          value: "true"
        - name: ENABLE_DOCS
          value: "false"
        - name: ENVIRONMENT
          value: development
        - name: LOG_LEVEL
          value: INFO
        - name: ENABLE_OBO
          value: "false"
        - name: OTEL_TRACES_SAMPLER
          value: always_on
        - name: OTEL_PYTHON_LOG_CORRELATION
          value: "true"
        - name: SERVING_ENDPOINT_NAME
          valueFrom: serving-endpoint
        - name: JOB_ID
          valueFrom: app-job
        - name: VOLUME_ROOT
          valueFrom: uc-volume
        - name: OPENAI_KEY
          valueFrom: openai-key
        - name: LAKEBASE_PASSWORD
          valueFrom: lakebase-password
        - name: KNOWLEDGE_ASSISTANT_ENDPOINT
          valueFrom: knowledge-assistant

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev
      environment: development
      log_level: DEBUG
      app_config:
        command:
          - python
          - run_app.py
        env:
          - name: SERVE_STATIC
            value: "true"
          - name: ENABLE_DOCS
            value: "true"
          - name: ENVIRONMENT
            value: development
          - name: LOG_LEVEL
            value: DEBUG
          - name: ENABLE_OBO
            value: "false"
          - name: OTEL_TRACES_SAMPLER
            value: always_on
          - name: OTEL_PYTHON_LOG_CORRELATION
            value: "true"
          - name: SERVING_ENDPOINT_NAME
            valueFrom: serving-endpoint
          - name: JOB_ID
            valueFrom: app-job
          - name: VOLUME_ROOT
            valueFrom: uc-volume
          - name: OPENAI_KEY
            valueFrom: openai-key
          - name: LAKEBASE_PASSWORD
            valueFrom: lakebase-password

  staging:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      resource_name_suffix: stg
      environment: staging
      log_level: INFO
      app_name: databricks-apps-fastapi-starter-stg

  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      resource_name_suffix: prod
      environment: production
      log_level: INFO
      enable_obo: "true"
      app_name: databricks-apps-fastapi-starter-prod
      app_config:
        command:
          - python
          - run_app.py
        env:
          - name: SERVE_STATIC
            value: "true"
          - name: ENABLE_DOCS
            value: "false"
          - name: ENVIRONMENT
            value: production
          - name: LOG_LEVEL
            value: INFO
          - name: ENABLE_OBO
            value: "true"
          - name: OTEL_TRACES_SAMPLER
            value: always_on
          - name: OTEL_PYTHON_LOG_CORRELATION
            value: "true"
          - name: SERVING_ENDPOINT_NAME
            valueFrom: serving-endpoint
          - name: JOB_ID
            valueFrom: app-job
          - name: VOLUME_ROOT
            valueFrom: uc-volume
          - name: OPENAI_KEY
            valueFrom: openai-key
          - name: LAKEBASE_PASSWORD
            valueFrom: lakebase-password
