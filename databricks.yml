bundle:
  name: databricks-apps-fastapi-starter
  databricks_cli_version: ">= 0.283.0"

include:
  - resources/*.yml

sync:
  exclude:
    - backend/tests/**
    - frontend/**
    - .github/**
    - backend/.venv/**
    - backend/.mypy_cache/**
    - backend/.ruff_cache/**
    - backend/.pytest_cache/**
    - backend/alembic/**
    - "*.egg-info/**"
    - backend/.local/**
    - backend/.coverage
    - backend/coverage.xml
    - "*.md"

variables:
  app_name:
    description: Databricks app name
    default: databricks-apps-fastapi-starter
  resource_name_suffix:
    description: Environment suffix for resource names
    default: dev
  environment:
    description: Runtime environment label
    default: development
  log_level:
    description: App log level
    default: INFO
  enable_obo:
    description: Whether to enable OBO behavior
    default: "false"
  volume_full_name:
    description: UC volume full name (catalog.schema.volume)
    default: main.default.starter_volume
  cluster_node_type:
    description: Node type for job clusters
    default: i3.xlarge
  knowledge_assistant_endpoint_name:
    description: Name of the Knowledge Assistant serving endpoint (created in Agent Bricks)
    default: ""
  knowledge_assistant_name:
    description: Knowledge Assistant entity name for bootstrap source registration
    default: ""
  app_agent_name:
    description: Name of the remote Databricks App specialist agent
    default: ""
  genie_space_id:
    description: Genie space ID for data specialist
    default: ""
  supervisor_model:
    description: Model name for the LangGraph supervisor
    default: ""
  serving_agent_endpoint:
    description: Name of the serving agent endpoint
    default: ""
  serving_agent_api_mode:
    description: Serving agent API mode (responses or chat_completions)
    default: responses
  serving_agent_uc_model_name:
    description: Unity Catalog model name for the serving agent
    default: ""
  serving_agent_chat_model:
    description: Upstream LLM model name the serving agent calls via AI Gateway
    default: databricks-claude-sonnet-4
  serving_agent_experiment_name:
    description: MLflow experiment path for serving agent traces
    default: /Shared/databricks-apps-fastapi-starter/serving-agent
  app_experiment_name:
    description: MLflow experiment path for app traces and evaluations
    default: /Shared/databricks-apps-fastapi-starter/app
  ai_gateway_embedding_model:
    description: Embedding model for knowledge specialist
    default: ""
  title_model:
    description: Model for chat title generation (defaults to supervisor model)
    default: ""
  langgraph_memory_backend:
    description: LangGraph memory backend (inmemory or lakebase)
    default: inmemory
  knowledge_volume_root:
    description: UC Volume root path for knowledge specialist
    default: ""
  vector_search_endpoint_name:
    description: Vector Search endpoint name for knowledge specialist
    default: ""
  vector_search_index_name:
    description: Vector Search index name for knowledge specialist
    default: ""
  rag_catalog_name:
    description: Catalog for RAG schema/tables/volume
    default: main
  rag_schema_name:
    description: Schema for RAG objects
    default: starter_rag
  rag_volume_name:
    description: Managed volume name for uploaded knowledge files
    default: uploads
  knowledge_upload_root:
    description: Volume subpath monitored by file-arrival trigger
    default: /Volumes/main/starter_rag/uploads/knowledge/uploads
  rag_checkpoint_root:
    description: Checkpoint root for raw ingestion (outside upload subtree)
    default: /Volumes/main/starter_rag/uploads/system/checkpoints/rag_ingestion
  rag_raw_table_name:
    description: Raw uploaded documents Delta table
    default: main.starter_rag.rag_raw_documents
  rag_chunk_table_name:
    description: Parsed and chunked documents Delta table
    default: main.starter_rag.rag_document_chunks
  app_config:
    type: complex
    description: Runtime config for the Databricks app
    default:
      command:
        - opentelemetry-instrument
        - python
        - backend/run_app.py
      env:
        - name: SERVE_STATIC
          value: "true"
        - name: ENABLE_DOCS
          value: "false"
        - name: ENVIRONMENT
          value: development
        - name: LOG_LEVEL
          value: INFO
        - name: ENABLE_OBO
          value: "false"
        - name: ENABLE_DATABRICKS_INTEGRATIONS
          value: "true"
        - name: ENABLE_LOCAL_DEV_AUTH_FALLBACK
          value: "false"
        - name: OTEL_TRACES_SAMPLER
          value: always_on
        - name: OTEL_PYTHON_LOG_CORRELATION
          value: "true"
        - name: SERVING_ENDPOINT_NAME
          valueFrom: serving-endpoint
        - name: JOB_ID
          valueFrom: app-job
        - name: VOLUME_ROOT
          valueFrom: uc-volume
        - name: PGHOST
          valueFrom: lakebase-db
        - name: PGDATABASE
          valueFrom: lakebase-db
        - name: PGUSER
          valueFrom: lakebase-db
        - name: KNOWLEDGE_ASSISTANT_ENDPOINT
          valueFrom: knowledge-assistant
        - name: APP_AGENT_NAME
          value: ${var.app_agent_name}
        - name: GENIE_SPACE_ID
          value: ${var.genie_space_id}
        - name: SUPERVISOR_MODEL
          value: ${var.supervisor_model}
        - name: SERVING_AGENT_ENDPOINT
          valueFrom: serving-agent
        - name: AI_GATEWAY_EMBEDDING_MODEL
          value: ${var.ai_gateway_embedding_model}
        - name: TITLE_MODEL
          value: ${var.title_model}
        - name: SERVING_AGENT_API_MODE
          value: ${var.serving_agent_api_mode}
        - name: LANGGRAPH_MEMORY_BACKEND
          value: ${var.langgraph_memory_backend}
        - name: KNOWLEDGE_VOLUME_ROOT
          value: ${var.knowledge_volume_root}
        - name: VECTOR_SEARCH_ENDPOINT_NAME
          value: ${var.vector_search_endpoint_name}
        - name: VECTOR_SEARCH_INDEX_NAME
          value: ${var.vector_search_index_name}
        - name: ENABLE_CHAT_TITLE_GENERATION
          value: "true"
        - name: MAX_UPLOAD_BYTES
          value: "52428800"
        - name: MLFLOW_TRACKING_URI
          value: "databricks"
        - name: MLFLOW_REGISTRY_URI
          value: "databricks-uc"
        - name: MLFLOW_EXPERIMENT_ID
          valueFrom: experiment

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev
      environment: development
      log_level: DEBUG
      serving_agent_endpoint: serving-agent-dev
      app_config:
        command:
          - opentelemetry-instrument
          - python
          - backend/run_app.py
        env:
          - name: SERVE_STATIC
            value: "true"
          - name: ENABLE_DOCS
            value: "true"
          - name: ENVIRONMENT
            value: development
          - name: LOG_LEVEL
            value: DEBUG
          - name: ENABLE_OBO
            value: "false"
          - name: ENABLE_DATABRICKS_INTEGRATIONS
            value: "true"
          - name: ENABLE_LOCAL_DEV_AUTH_FALLBACK
            value: "false"
          - name: OTEL_TRACES_SAMPLER
            value: always_on
          - name: OTEL_PYTHON_LOG_CORRELATION
            value: "true"
          - name: SERVING_ENDPOINT_NAME
            valueFrom: serving-endpoint
          - name: JOB_ID
            valueFrom: app-job
          - name: VOLUME_ROOT
            valueFrom: uc-volume
          - name: PGHOST
            valueFrom: lakebase-db
          - name: PGDATABASE
            valueFrom: lakebase-db
          - name: PGUSER
            valueFrom: lakebase-db
          - name: KNOWLEDGE_ASSISTANT_ENDPOINT
            valueFrom: knowledge-assistant
          - name: APP_AGENT_NAME
            value: ${var.app_agent_name}
          - name: GENIE_SPACE_ID
            value: ${var.genie_space_id}
          - name: SUPERVISOR_MODEL
            value: ${var.supervisor_model}
          - name: SERVING_AGENT_ENDPOINT
            valueFrom: serving-agent
          - name: AI_GATEWAY_EMBEDDING_MODEL
            value: ${var.ai_gateway_embedding_model}
          - name: TITLE_MODEL
            value: ${var.title_model}
          - name: SERVING_AGENT_API_MODE
            value: ${var.serving_agent_api_mode}
          - name: LANGGRAPH_MEMORY_BACKEND
            value: ${var.langgraph_memory_backend}
          - name: KNOWLEDGE_VOLUME_ROOT
            value: ${var.knowledge_volume_root}
          - name: VECTOR_SEARCH_ENDPOINT_NAME
            value: ${var.vector_search_endpoint_name}
          - name: VECTOR_SEARCH_INDEX_NAME
            value: ${var.vector_search_index_name}
          - name: ENABLE_CHAT_TITLE_GENERATION
            value: "true"
          - name: MAX_UPLOAD_BYTES
            value: "52428800"
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: MLFLOW_EXPERIMENT_ID
            valueFrom: experiment
  staging:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      resource_name_suffix: stg
      environment: staging
      log_level: INFO
      app_name: databricks-apps-fastapi-starter-stg
      serving_agent_endpoint: serving-agent-stg

  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      resource_name_suffix: prod
      environment: production
      log_level: INFO
      enable_obo: "true"
      app_name: databricks-apps-fastapi-starter-prod
      serving_agent_endpoint: serving-agent-prod
      app_config:
        command:
          - opentelemetry-instrument
          - python
          - backend/run_app.py
        env:
          - name: SERVE_STATIC
            value: "true"
          - name: ENABLE_DOCS
            value: "false"
          - name: ENVIRONMENT
            value: production
          - name: LOG_LEVEL
            value: INFO
          - name: ENABLE_OBO
            value: "true"
          - name: ENABLE_DATABRICKS_INTEGRATIONS
            value: "true"
          - name: ENABLE_LOCAL_DEV_AUTH_FALLBACK
            value: "false"
          - name: OTEL_TRACES_SAMPLER
            value: always_on
          - name: OTEL_PYTHON_LOG_CORRELATION
            value: "true"
          - name: SERVING_ENDPOINT_NAME
            valueFrom: serving-endpoint
          - name: JOB_ID
            valueFrom: app-job
          - name: VOLUME_ROOT
            valueFrom: uc-volume
          - name: PGHOST
            valueFrom: lakebase-db
          - name: PGDATABASE
            valueFrom: lakebase-db
          - name: PGUSER
            valueFrom: lakebase-db
          - name: KNOWLEDGE_ASSISTANT_ENDPOINT
            valueFrom: knowledge-assistant
          - name: APP_AGENT_NAME
            value: ${var.app_agent_name}
          - name: GENIE_SPACE_ID
            value: ${var.genie_space_id}
          - name: SUPERVISOR_MODEL
            value: ${var.supervisor_model}
          - name: SERVING_AGENT_ENDPOINT
            valueFrom: serving-agent
          - name: AI_GATEWAY_EMBEDDING_MODEL
            value: ${var.ai_gateway_embedding_model}
          - name: TITLE_MODEL
            value: ${var.title_model}
          - name: SERVING_AGENT_API_MODE
            value: ${var.serving_agent_api_mode}
          - name: LANGGRAPH_MEMORY_BACKEND
            value: ${var.langgraph_memory_backend}
          - name: KNOWLEDGE_VOLUME_ROOT
            value: ${var.knowledge_volume_root}
          - name: VECTOR_SEARCH_ENDPOINT_NAME
            value: ${var.vector_search_endpoint_name}
          - name: VECTOR_SEARCH_INDEX_NAME
            value: ${var.vector_search_index_name}
          - name: ENABLE_CHAT_TITLE_GENERATION
            value: "true"
          - name: MAX_UPLOAD_BYTES
            value: "52428800"
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: MLFLOW_EXPERIMENT_ID
            valueFrom: experiment
