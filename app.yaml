command: [
  "sh", "-c",
  "alembic upgrade head || echo 'Alembic migration failed; starting app so health endpoints can report readiness.' >&2; opentelemetry-instrument uvicorn main:app"
]
env:
  - name: OTEL_TRACES_SAMPLER
    value: "always_on"
  - name: OTEL_PYTHON_LOG_CORRELATION
    value: "true"
