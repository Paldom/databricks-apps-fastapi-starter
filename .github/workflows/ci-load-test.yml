name: Load test

on:
  workflow_dispatch:
  pull_request:

jobs:
  load-test:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST != '' && secrets.DATABRICKS_HOST || 'localhost' }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID != '' && secrets.DATABRICKS_CLIENT_ID || 'dummy' }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET != '' && secrets.DATABRICKS_CLIENT_SECRET || 'dummy' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Start app
        run: uv run uvicorn main:app & sleep 5
      - name: Run Locust
        run: |
          HOST=http://localhost:8000 \
          DATABRICKS_HOST="$DATABRICKS_HOST" \
          DATABRICKS_CLIENT_ID="$DATABRICKS_CLIENT_ID" \
          DATABRICKS_CLIENT_SECRET="$DATABRICKS_CLIENT_SECRET" \
          uv run locust -f tests/performance/locustfile.py --headless -u 50 -r 10 -t 60s --csv=locust --csv-full-history --html=locust-report.html
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: |
            locust_stats_history.csv
            locust-report.html
