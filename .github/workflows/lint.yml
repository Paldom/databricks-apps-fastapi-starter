name: Static analysis

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy --ignore-missing-imports .
      - name: Bandit
        run: uv run bandit -r . -q
      - name: Check requirements.txt is in sync
        run: |
          uv export --no-hashes --no-editable --format=requirements.txt > /tmp/requirements-check.txt
          diff -u requirements.txt /tmp/requirements-check.txt || {
            echo "::error::requirements.txt is out of sync. Run: uv export --no-hashes --no-editable --format=requirements.txt > requirements.txt"
            exit 1
          }
