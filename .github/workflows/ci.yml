name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  runtime-build:
    name: Runtime Build (Python 3.11, Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        run: uv sync --extra dev
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy --ignore-missing-imports .
      - name: Bandit
        run: uv run bandit -r . -q
      - name: Pytest
        run: uv run pytest --cov .

  contract-and-frontend:
    name: Contract & Frontend (Node 24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        run: uv sync --extra dev
      - name: Install frontend
        run: cd frontend && npm ci
      - name: Export backend OpenAPI
        run: uv run python scripts/export_openapi.py
      - name: Regenerate frontend API client
        run: cd frontend && npm run api:gen
      - name: Check generated files are committed
        run: |
          git diff --exit-code -- requirements.txt openapi.json frontend/src/shared/api/generated || {
            echo "::error::Generated files are out of sync. Run: make generate"
            exit 1
          }
      - name: Frontend typecheck
        run: cd frontend && npm run typecheck
      - name: Frontend lint
        run: cd frontend && npm run lint
      - name: Frontend test
        run: cd frontend && npm run test
      - name: Check requirements.txt is in sync
        run: |
          uv export --no-hashes --no-editable --format=requirements.txt > /tmp/requirements-check.txt
          diff -u requirements.txt /tmp/requirements-check.txt || {
            echo "::error::requirements.txt is out of sync. Run: uv export --no-hashes --no-editable --format=requirements.txt > requirements.txt"
            exit 1
          }
