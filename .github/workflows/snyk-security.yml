name: Snyk Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"    # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: cd backend && uv sync

      - name: Install Snyk CLI
        run: npm install -g snyk

      # Failing gate — exits non-zero on high/critical vulnerabilities
      - name: Snyk open-source test
        run: snyk test --file=backend/requirements.txt --severity-threshold=high --sarif-file-output=snyk-oss.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk code test (SAST)
        run: snyk code test --sarif-file-output=snyk-code.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk IaC test
        run: snyk iac test databricks.yml resources/*.yml --sarif-file-output=snyk-iac.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload OSS SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

      - name: Upload Code SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

      - name: Snyk monitor (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: snyk monitor --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
