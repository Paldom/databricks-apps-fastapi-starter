resources:
  apps:
    fastapi_app:
      name: ${var.app_name}
      description: "FastAPI reference app deployed from bundle"
      source_code_path: .
      config: ${var.app_config}
      permissions:
        - level: CAN_USE
          group_name: users
      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: ${resources.model_serving_endpoints.starter_endpoint.name}
            permission: CAN_QUERY
        - name: app-job
          job:
            id: ${resources.jobs.starter_job.id}
            permission: CAN_MANAGE_RUN
        - name: uc-volume
          uc_securable:
            securable_type: VOLUME
            securable_full_name: ${var.volume_full_name}
            permission: WRITE_VOLUME
        - name: openai-key
          secret:
            scope: ${resources.secret_scopes.starter_scope.name}
            key: OPENAI_KEY
            permission: READ
        - name: lakebase-password
          secret:
            scope: ${resources.secret_scopes.starter_scope.name}
            key: LAKEBASE_PASSWORD
            permission: READ
        - name: knowledge-assistant
          serving_endpoint:
            name: ${var.knowledge_assistant_endpoint_name}
            permission: CAN_QUERY
