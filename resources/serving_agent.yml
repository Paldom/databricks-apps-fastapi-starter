resources:
  experiments:
    serving_agent_experiment:
      name: ${var.serving_agent_experiment_name}

  jobs:
    deploy_serving_agent:
      name: DeployServingAgent-${var.resource_name_suffix}
      max_concurrent_runs: 1
      job_clusters:
        - job_cluster_key: tiny
          new_cluster: ${resources.clusters.tiny_cluster}
      tasks:
        - task_key: deploy_serving_agent
          job_cluster_key: tiny
          notebook_task:
            notebook_path: notebooks/serving/deploy.py
            base_parameters:
              serving_agent_endpoint: ${var.serving_agent_endpoint}
              serving_agent_uc_model_name: ${var.serving_agent_uc_model_name}
              serving_agent_experiment_id: ${resources.experiments.serving_agent_experiment.id}
              serving_agent_chat_model: ${var.serving_agent_chat_model}
