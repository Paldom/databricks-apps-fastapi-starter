resources:
  jobs:
    rag_bootstrap_job:
      name: RagBootstrap-${var.resource_name_suffix}
      max_concurrent_runs: 1

      job_clusters:
        - job_cluster_key: rag_bootstrap
          new_cluster:
            spark_version: 17.1.x-scala2.12
            node_type_id: ${var.cluster_node_type}
            num_workers: 0
            autotermination_minutes: 10

      tasks:
        - task_key: bootstrap_resources
          job_cluster_key: rag_bootstrap
          libraries:
            - pypi:
                package: databricks-sdk
            - pypi:
                package: databricks-vectorsearch
          notebook_task:
            notebook_path: notebooks/jobs/bootstrap_rag_resources.py
            base_parameters:
              chunk_table_name: ${var.rag_chunk_table_name}
              vector_search_endpoint_name: ${var.vector_search_endpoint_name}
              vector_search_index_name: ${var.vector_search_index_name}
              embedding_model_name: databricks-gte-large-en
              knowledge_assistant_name: ${var.knowledge_assistant_name}

    rag_ingestion_job:
      name: RagIngestionJob-${var.resource_name_suffix}
      max_concurrent_runs: 1

      trigger:
        file_arrival:
          url: ${var.knowledge_upload_root}
          min_time_between_triggers_seconds: 60
          wait_after_last_change_seconds: 15

      job_clusters:
        - job_cluster_key: rag_ingestion
          new_cluster:
            spark_version: 17.1.x-scala2.12
            node_type_id: ${var.cluster_node_type}
            num_workers: 1
            autotermination_minutes: 20

      tasks:
        - task_key: ingest_documents
          job_cluster_key: rag_ingestion
          libraries:
            - pypi:
                package: databricks-sdk
            - pypi:
                package: databricks-vectorsearch
          notebook_task:
            notebook_path: notebooks/jobs/rag_ingestion_job.py
            base_parameters:
              source_path: ${var.knowledge_upload_root}
              checkpoint_path: ${var.rag_checkpoint_root}
              raw_table_name: ${var.rag_raw_table_name}
              chunk_table_name: ${var.rag_chunk_table_name}
              vector_search_endpoint_name: ${var.vector_search_endpoint_name}
              vector_search_index_name: ${var.vector_search_index_name}
              embedding_model_name: databricks-gte-large-en
