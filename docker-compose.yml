services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${PGDATABASE:-mydb}
      POSTGRES_USER: ${PGUSER:-myuser}
      POSTGRES_PASSWORD: ${PGPASSWORD:-mypassword}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGUSER:-myuser} -d ${PGDATABASE:-mydb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: dev
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+asyncpg://${PGUSER:-myuser}:${PGPASSWORD:-mypassword}@postgres:5432/${PGDATABASE:-mydb}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
