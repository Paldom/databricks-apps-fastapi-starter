components:
  schemas:
    AgentMessage:
      properties:
        content:
          maxLength: 8192
          minLength: 1
          title: Content
          type: string
        role:
          default: user
          enum:
          - user
          - assistant
          title: Role
          type: string
      required:
      - content
      title: AgentMessage
      type: object
    AgentQuestion:
      properties:
        messages:
          items:
            $ref: '#/components/schemas/AgentMessage'
          maxItems: 20
          minItems: 1
          title: Messages
          type: array
      required:
      - messages
      title: AgentQuestion
      type: object
    Body_uploadDocument:
      properties:
        file:
          format: binary
          title: File
          type: string
        projectId:
          anyOf:
          - type: string
          - type: 'null'
          title: Projectid
      required:
      - file
      title: Body_uploadDocument
      type: object
    Body_upload_examples_uc_upload_post:
      properties:
        file:
          contentMediaType: application/octet-stream
          title: File
          type: string
      required:
      - file
      title: Body_upload_examples_uc_upload_post
      type: object
    Chat:
      additionalProperties: false
      example:
        createdAt: '2024-01-15T10:00:00Z'
        id: c4
        projectId: work
        title: Q1 metrics summary
        updatedAt: '2024-01-15T10:00:00Z'
      properties:
        createdAt:
          format: date-time
          title: Createdat
          type: string
        id:
          title: Id
          type: string
        projectId:
          title: Projectid
          type: string
        title:
          title: Title
          type: string
        updatedAt:
          format: date-time
          title: Updatedat
          type: string
      required:
      - id
      - title
      - projectId
      - createdAt
      - updatedAt
      title: Chat
      type: object
    ChatSearchResult:
      additionalProperties: false
      example:
        createdAt: '2024-01-15T10:00:00Z'
        id: c4
        projectId: work
        projectName: Work
        title: Q1 metrics summary
        updatedAt: '2024-01-15T10:00:00Z'
      properties:
        createdAt:
          format: date-time
          title: Createdat
          type: string
        id:
          title: Id
          type: string
        projectId:
          title: Projectid
          type: string
        projectName:
          title: Projectname
          type: string
        title:
          title: Title
          type: string
        updatedAt:
          format: date-time
          title: Updatedat
          type: string
      required:
      - id
      - title
      - projectId
      - projectName
      - createdAt
      - updatedAt
      title: ChatSearchResult
      type: object
    ChatStreamEvent:
      discriminator:
        mapping:
          done: '#/components/schemas/DoneEvent'
          error: '#/components/schemas/ErrorEvent'
          text-delta: '#/components/schemas/TextDeltaEvent'
          tool-call-begin: '#/components/schemas/ToolCallBeginEvent'
          tool-call-delta: '#/components/schemas/ToolCallDeltaEvent'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/TextDeltaEvent'
      - $ref: '#/components/schemas/ToolCallBeginEvent'
      - $ref: '#/components/schemas/ToolCallDeltaEvent'
      - $ref: '#/components/schemas/DoneEvent'
      - $ref: '#/components/schemas/ErrorEvent'
    ChatStreamMessage:
      properties:
        content:
          title: Content
          type: string
        role:
          enum:
          - system
          - user
          - assistant
          title: Role
          type: string
      required:
      - role
      - content
      title: ChatStreamMessage
      type: object
    ChatStreamRequest:
      example:
        messages:
        - content: Hello, how are you?
          role: user
      properties:
        messages:
          items:
            $ref: '#/components/schemas/ChatStreamMessage'
          title: Messages
          type: array
        run_config:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Run Config
        thread_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Thread Id
      required:
      - messages
      title: ChatStreamRequest
      type: object
    CreateChatRequest:
      additionalProperties: false
      example:
        title: New chat
      properties:
        title:
          title: Title
          type: string
      required:
      - title
      title: CreateChatRequest
      type: object
    CreateProjectRequest:
      additionalProperties: false
      example:
        name: New Project
      properties:
        name:
          title: Name
          type: string
      required:
      - name
      title: CreateProjectRequest
      type: object
    CurrentUser:
      properties:
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        id:
          title: Id
          type: string
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        preferred_username:
          anyOf:
          - type: string
          - type: 'null'
          title: Preferred Username
      required:
      - id
      title: CurrentUser
      type: object
    DependencyCheck:
      properties:
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
        status:
          $ref: '#/components/schemas/HealthStatus'
      required:
      - status
      title: DependencyCheck
      type: object
    DetailedHealthResponse:
      properties:
        ai:
          $ref: '#/components/schemas/DependencyCheck'
        database:
          $ref: '#/components/schemas/DependencyCheck'
        ok:
          title: Ok
          type: boolean
        vector_search:
          $ref: '#/components/schemas/DependencyCheck'
        workspace:
          $ref: '#/components/schemas/DependencyCheck'
      required:
      - ok
      - database
      - workspace
      - ai
      - vector_search
      title: DetailedHealthResponse
      type: object
    Document:
      additionalProperties: false
      example:
        addedAt: '2024-01-15T10:00:00Z'
        id: doc-1
        name: Q1 Financial Report.pdf
        size: 2457600
        status: ingested
        type: application/pdf
      properties:
        addedAt:
          format: date-time
          title: Addedat
          type: string
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
        projectId:
          anyOf:
          - type: string
          - type: 'null'
          title: Projectid
        size:
          title: Size
          type: integer
        status:
          $ref: '#/components/schemas/DocumentStatus'
        type:
          title: Type
          type: string
      required:
      - id
      - name
      - size
      - type
      - status
      - addedAt
      title: Document
      type: object
    DocumentStatus:
      enum:
      - pending
      - ingested
      - error
      title: DocumentStatus
      type: string
    DocumentStatusResponse:
      additionalProperties: false
      example:
        id: doc-1
        status: ingested
      properties:
        id:
          title: Id
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
      required:
      - id
      - status
      title: DocumentStatusResponse
      type: object
    DoneEvent:
      properties:
        finish_reason:
          enum:
          - stop
          - length
          - error
          title: Finish Reason
          type: string
        type:
          const: done
          title: Type
          type: string
      required:
      - type
      - finish_reason
      title: DoneEvent
      type: object
    ErrorEvent:
      properties:
        code:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Code
        message:
          title: Message
          type: string
        type:
          const: error
          title: Type
          type: string
      required:
      - type
      - message
      title: ErrorEvent
      type: object
    ExampleMessage:
      properties:
        text:
          maxLength: 4096
          minLength: 1
          title: Text
          type: string
      required:
      - text
      title: ExampleMessage
      type: object
    ExampleRow:
      properties:
        data:
          maxLength: 65536
          title: Data
          type: string
        id:
          maxLength: 255
          title: Id
          type: string
      required:
      - id
      - data
      title: ExampleRow
      type: object
    ExampleTitle:
      properties:
        title:
          maxLength: 255
          minLength: 1
          title: Title
          type: string
      required:
      - title
      title: ExampleTitle
      type: object
    GenieQuestion:
      properties:
        content:
          maxLength: 8192
          minLength: 1
          title: Content
          type: string
      required:
      - content
      title: GenieQuestion
      type: object
    HealthStatus:
      enum:
      - ok
      - fail
      title: HealthStatus
      type: string
    LiveResponse:
      properties:
        ok:
          default: true
          title: Ok
          type: boolean
      title: LiveResponse
      type: object
    PaginatedChatSearchResults:
      additionalProperties: false
      properties:
        hasMore:
          default: false
          title: Hasmore
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/ChatSearchResult'
          title: Items
          type: array
        nextCursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Nextcursor
      required:
      - items
      title: PaginatedChatSearchResults
      type: object
    PaginatedChats:
      additionalProperties: false
      properties:
        hasMore:
          default: false
          title: Hasmore
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/Chat'
          title: Items
          type: array
        nextCursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Nextcursor
      required:
      - items
      title: PaginatedChats
      type: object
    PaginatedDocuments:
      additionalProperties: false
      properties:
        hasMore:
          default: false
          title: Hasmore
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/Document'
          title: Items
          type: array
        nextCursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Nextcursor
      required:
      - items
      title: PaginatedDocuments
      type: object
    PaginatedProjects:
      additionalProperties: false
      properties:
        hasMore:
          default: false
          title: Hasmore
          type: boolean
        items:
          items:
            $ref: '#/components/schemas/Project'
          title: Items
          type: array
        nextCursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Nextcursor
      required:
      - items
      title: PaginatedProjects
      type: object
    Project:
      additionalProperties: false
      example:
        chatCount: 2
        createdAt: '2024-01-15T10:00:00Z'
        id: work
        name: Work
      properties:
        chatCount:
          title: Chatcount
          type: integer
        createdAt:
          format: date-time
          title: Createdat
          type: string
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
      required:
      - id
      - name
      - createdAt
      - chatCount
      title: Project
      type: object
    ReadyResponse:
      properties:
        db:
          title: Db
          type: boolean
        ok:
          title: Ok
          type: boolean
      required:
      - ok
      - db
      title: ReadyResponse
      type: object
    TextDeltaEvent:
      properties:
        delta:
          title: Delta
          type: string
        type:
          const: text-delta
          title: Type
          type: string
      required:
      - type
      - delta
      title: TextDeltaEvent
      type: object
    ToolCallBeginEvent:
      properties:
        tool_call_id:
          title: Tool Call Id
          type: string
        tool_name:
          title: Tool Name
          type: string
        type:
          const: tool-call-begin
          title: Type
          type: string
      required:
      - type
      - tool_call_id
      - tool_name
      title: ToolCallBeginEvent
      type: object
    ToolCallDeltaEvent:
      properties:
        args_delta:
          title: Args Delta
          type: string
        tool_call_id:
          title: Tool Call Id
          type: string
        type:
          const: tool-call-delta
          title: Type
          type: string
      required:
      - type
      - tool_call_id
      - args_delta
      title: ToolCallDeltaEvent
      type: object
    UpdateChatRequest:
      additionalProperties: false
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
      title: UpdateChatRequest
      type: object
    UpdateProjectRequest:
      additionalProperties: false
      properties:
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
      title: UpdateProjectRequest
      type: object
    UserSettings:
      additionalProperties: false
      example:
        email: john@example.com
        name: John Doe
        notifications: true
      properties:
        email:
          title: Email
          type: string
        name:
          title: Name
          type: string
        notifications:
          title: Notifications
          type: boolean
      required:
      - name
      - email
      - notifications
      title: UserSettings
      type: object
info:
  title: Databricks Apps FastAPI Starter API
  version: 0.1.0
openapi: 3.1.0
paths:
  /chat/stream:
    post:
      operationId: chatStream
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
        required: true
      responses:
        '200':
          content:
            application/x-ndjson:
              schema:
                $ref: '#/components/schemas/ChatStreamEvent'
          description: Successful Response
      summary: Chat Stream
      tags:
      - chat
  /chats/recent:
    get:
      operationId: getRecentChats
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 50
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSearchResults'
          description: Successful Response
      summary: Get Recent Chats
      tags:
      - chats
  /chats/search:
    get:
      operationId: searchChats
      parameters:
      - in: query
        name: q
        required: true
        schema:
          minLength: 1
          title: Q
          type: string
      - in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSearchResults'
          description: Successful Response
      summary: Search Chats
      tags:
      - chats
  /chats/{chatId}:
    delete:
      operationId: deleteChat
      parameters:
      - in: path
        name: chatId
        required: true
        schema:
          title: Chatid
          type: string
      responses:
        '204':
          description: Successful Response
      summary: Delete Chat
      tags:
      - chats
    patch:
      operationId: updateChat
      parameters:
      - in: path
        name: chatId
        required: true
        schema:
          title: Chatid
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChatRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chat'
          description: Successful Response
      summary: Update Chat
      tags:
      - chats
  /documents:
    get:
      operationId: listDocuments
      parameters:
      - in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          title: Limit
          type: integer
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocumentStatus'
          - type: 'null'
          title: Status
      - in: query
        name: projectId
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Projectid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDocuments'
          description: Successful Response
      summary: List Documents
      tags:
      - documents
    post:
      operationId: uploadDocument
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_uploadDocument'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
          description: Successful Response
      summary: Upload Document
      tags:
      - documents
  /documents/{documentId}:
    delete:
      operationId: deleteDocument
      parameters:
      - in: path
        name: documentId
        required: true
        schema:
          title: Documentid
          type: string
      responses:
        '204':
          description: Successful Response
      summary: Delete Document
      tags:
      - documents
  /documents/{documentId}/status:
    get:
      operationId: getDocumentStatus
      parameters:
      - in: path
        name: documentId
        required: true
        schema:
          title: Documentid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentStatusResponse'
          description: Successful Response
      summary: Get Document Status
      tags:
      - documents
  /examples/agent/ask:
    post:
      operationId: agent_ask_examples_agent_ask_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentQuestion'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Agent Ask
      tags:
      - examples
  /examples/agent/ask/stream:
    post:
      operationId: agent_ask_stream_examples_agent_ask_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentQuestion'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Agent Ask Stream
      tags:
      - examples
  /examples/embed:
    post:
      operationId: embed_examples_embed_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleTitle'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Embed
      tags:
      - examples
  /examples/genie/{space_id}/ask:
    post:
      operationId: genie_start_conversation_examples_genie__space_id__ask_post
      parameters:
      - in: path
        name: space_id
        required: true
        schema:
          title: Space Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenieQuestion'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Genie Start Conversation
      tags:
      - examples
  /examples/genie/{space_id}/{conversation_id}/ask:
    post:
      operationId: genie_follow_up_examples_genie__space_id___conversation_id__ask_post
      parameters:
      - in: path
        name: space_id
        required: true
        schema:
          title: Space Id
          type: string
      - in: path
        name: conversation_id
        required: true
        schema:
          title: Conversation Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenieQuestion'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Genie Follow Up
      tags:
      - examples
  /examples/job:
    post:
      operationId: run_job_examples_job_post
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - additionalProperties: true
                type: object
              - type: 'null'
              title: Params
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Run Job
      tags:
      - examples
  /examples/pg:
    post:
      operationId: pg_demo_examples_pg_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleMessage'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Pg Demo
      tags:
      - examples
  /examples/serving:
    post:
      operationId: serving_examples_serving_post
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/ExampleRow'
              title: Rows
              type: array
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Serving
      tags:
      - examples
  /examples/uc/download:
    get:
      operationId: download_examples_uc_download_get
      parameters:
      - in: query
        name: relative_path
        required: true
        schema:
          title: Relative Path
          type: string
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Download
      tags:
      - examples
  /examples/uc/upload:
    post:
      operationId: upload_examples_uc_upload_post
      parameters:
      - in: query
        name: relative_path
        required: true
        schema:
          title: Relative Path
          type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_examples_uc_upload_post'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Upload
      tags:
      - examples
  /examples/vector/query:
    post:
      operationId: vector_query_examples_vector_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleTitle'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Vector Query
      tags:
      - examples
  /examples/vector/store:
    post:
      operationId: vector_store_examples_vector_store_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExampleTitle'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Vector Store
      tags:
      - examples
  /health:
    get:
      operationId: getHealth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthResponse'
          description: Successful Response
      summary: Health
      tags:
      - health
  /health/live:
    get:
      operationId: healthLive
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LiveResponse'
          description: Successful Response
      summary: Live
      tags:
      - health
  /health/ready:
    get:
      operationId: healthReady
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
          description: Successful Response
      summary: Ready
      tags:
      - health
  /me:
    get:
      operationId: getMe
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
          description: Successful Response
      summary: Get Me
      tags:
      - me
  /projects:
    get:
      operationId: listProjects
      parameters:
      - in: query
        name: cursor
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - in: query
        name: limit
