services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      POSTGRES_DB: ${PGDATABASE:-mydb}
      POSTGRES_USER: ${PGUSER:-myuser}
      POSTGRES_PASSWORD: ${PGPASSWORD:-mypassword}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PGUSER:-myuser} -d ${PGDATABASE:-mydb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
